<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokemon Tournament Companion</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
    <h1>Pokemon Tournament Companion</h1>
    
    <h2>Select Game</h2>
    <select id="gameSelect" onchange="changeGame()">
        <option value="gsc">Gold / Silver / Crystal (1999)</option>
        <option value="frlg">Fire Red / Leaf Green (2004)</option>
        <option value="rse">Ruby / Sapphire / Emerald (2002)</option>
    </select>

    <h2>Level Cap</h2>
    <select id="levelCap" onchange="changeLevelCap()">
        <option value="55">Level 55</option>
        <option value="60">Level 60</option>
    </select>

    <div class="menu">
        <button onclick="openPage('pokedex')">Pokédex</button>
        <button onclick="openPage('team')">Team Planner</button>
        <button onclick="openPage('moves')">Move Lookup</button>
        <button onclick="openPage('items')">Item Locations</button>
        <button onclick="openPage('maps')">Maps</button>
        <button onclick="openPage('weakness')">Weakness Calculator</button>
    </div>

    <div id="content"></div>

    <script src="app.js"></script>
</body>
</html>
